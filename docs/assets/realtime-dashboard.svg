<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="dashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d44;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <style>
      .live-dot {
        animation: live-dot 1.5s ease-in-out infinite;
      }
      @keyframes live-dot {
        0%, 100% { r: 6; opacity: 1; }
        50% { r: 8; opacity: 0.5; }
      }
      .line-chart {
        animation: line-draw 3s ease-out infinite;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
      }
      @keyframes line-draw {
        to { stroke-dashoffset: 0; }
      }
      .number-count {
        animation: count-pulse 2s ease-in-out infinite;
      }
      @keyframes count-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      .metric-up {
        animation: metric-up 0.5s ease-out;
      }
      @keyframes metric-up {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="450" fill="url(#dashBg)"/>

  <!-- Header do Dashboard -->
  <g>
    <rect x="0" y="0" width="800" height="50" fill="#0f0f23"/>
    <text x="25" y="32" fill="#fff" font-size="18" font-weight="bold" font-family="Arial">📊 Dashboard - Análise de Sentimentos</text>

    <!-- Live Badge -->
    <g transform="translate(680, 15)">
      <rect x="0" y="0" width="100" height="22" rx="11" fill="#1a3a2a"/>
      <circle cx="15" cy="11" r="6" fill="#38ef7d" class="live-dot"/>
      <text x="32" y="16" fill="#38ef7d" font-size="11" font-weight="bold" font-family="Arial">LIVE</text>
    </g>

    <!-- Relógio -->
    <text x="790" y="30" text-anchor="end" fill="#666" font-size="11" font-family="monospace">
      2026-07-10 14:32:45
    </text>
  </g>

  <!-- Cards de Métricas (Top Row) -->
  <g transform="translate(20, 70)">
    <!-- Total Análises -->
    <rect x="0" y="0" width="180" height="90" rx="8" fill="url(#cardGrad)" stroke="#333"/>
    <text x="20" y="25" fill="#888" font-size="10" font-family="Arial">TOTAL ANÁLISES</text>
    <text x="20" y="60" class="number-count" fill="#fff" font-size="32" font-weight="bold" font-family="Arial">2,847</text>
    <text x="120" y="65" fill="#38ef7d" font-size="14" font-weight="bold">↑</text>
    <text x="140" y="75" fill="#38ef7d" font-size="11" font-family="Arial">+127 hoje</text>
  </g>

  <g transform="translate(220, 70)">
    <!-- Média Positiva -->
    <rect x="0" y="0" width="180" height="90" rx="8" fill="url(#cardGrad)" stroke="#333"/>
    <text x="20" y="25" fill="#888" font-size="10" font-family="Arial">MÉDIA POSITIVA</text>
    <text x="20" y="60" class="number-count" fill="#fff" font-size="32" font-weight="bold" font-family="Arial">58.3%</text>
    <rect x="120" y="45" width="50" height="8" rx="4" fill="#1a1a1a"/>
    <rect x="122" y="47" width="42" height="4" rx="2" fill="url(#positiveGrad)"/>
  </g>

  <g transform="translate(420, 70)">
    <!-- Processamento -->
    <rect x="0" y="0" width="180" height="90" rx="8" fill="url(#cardGrad)" stroke="#333"/>
    <text x="20" y="25" fill="#888" font-size="10" font-family="Arial">TEMPO MÉDIO</text>
    <text x="20" y="60" class="number-count" fill="#fff" font-size="32" font-weight="bold" font-family="Arial">23ms</text>
    <text x="100" y="75" fill="#666" font-size="10" font-family="Arial">últimos 500</text>
  </g>

  <g transform="translate(620, 70)">
    <!-- Erros -->
    <rect x="0" y="0" width="160" height="90" rx="8" fill="url(#cardGrad)" stroke="#333"/>
    <text x="20" y="25" fill="#888" font-size="10" font-family="Arial">TAXA DE ERRO</text>
    <text x="20" y="60" class="number-count" fill="#fff" font-size="32" font-weight="bold" font-family="Arial">0.02%</text>
    <text x="100" y="75" fill="#38ef7d" font-size="10" font-family="Arial">✓ OK</text>
  </g>

  <!-- Gráfico Principal (Evolução Temporal) -->
  <g transform="translate(20, 180)">
    <rect x="0" y="0" width="480" height="200" rx="8" fill="url(#cardGrad)" stroke="#333"/>
    <text x="20" y="25" fill="#fff" font-size="14" font-weight="bold" font-family="Arial">📈 Evolução Temporal</text>

    <!-- Eixos -->
    <line x1="40" y1="160" x2="450" y2="160" stroke="#444" stroke-width="1"/>
    <line x1="40" y1="40" x2="40" y2="160" stroke="#444" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="80" x2="450" y2="80" stroke="#333" stroke-width="0.5"/>
    <line x1="40" y1="120" x2="450" y2="120" stroke="#333" stroke-width="0.5"/>

    <!-- Linha Positiva (animada) -->
    <path class="line-chart" d="M 40 120 L 100 110 L 160 90 L 220 100 L 280 70 L 340 85 L 400 60 L 450 55"
          fill="none" stroke="#38ef7d" stroke-width="3" opacity="0.8"/>

    <!-- Linha Neutra (animada) -->
    <path class="line-chart" d="M 40 130 L 100 135 L 160 125 L 220 130 L 280 120 L 340 125 L 400 130 L 450 125"
          fill="none" stroke="#f7b733" stroke-width="3" opacity="0.6" style="animation-delay: 0.5s"/>

    <!-- Linha Negativa (animada) -->
    <path class="line-chart" d="M 40 100 L 100 115 L 160 120 L 220 110 L 280 130 L 340 115 L 400 140 L 450 135"
          fill="none" stroke="#fc4a1a" stroke-width="3" opacity="0.6" style="animation-delay: 1s"/>

    <!-- Legend -->
    <g transform="translate(60, 180)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#38ef7d" stroke-width="3"/>
      <text x="25" y="4" fill="#888" font-size="10" font-family="Arial">Positivo</text>

      <line x1="80" y1="0" x2="100" y2="0" stroke="#f7b733" stroke-width="3"/>
      <text x="105" y="4" fill="#888" font-size="10" font-family="Arial">Neutro</text>

      <line x1="160" y1="0" x2="180" y2="0" stroke="#fc4a1a" stroke-width="3"/>
      <text x="185" y="4" fill="#888" font-size="10" font-family="Arial">Negativo</text>
    </g>
  </g>

  <!-- Distribuição Atual (Donut Chart) -->
  <g transform="translate(520, 180)">
    <rect x="0" y="0" width="260" height="200" rx="8" fill="url(#cardGrad)" stroke="#333"/>
    <text x="130" y="25" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Arial">📊 Distribuição</text>

    <!-- Donut Chart Simulado -->
    <g transform="translate(130, 100)">
      <!-- Círculo base -->
      <circle cx="0" cy="0" r="50" fill="#1a1a1a"/>

      <!-- Fatias (usando arcs) -->
      <path d="M 0 -50 A 50 50 0 0 1 35 -35" fill="none" stroke="#38ef7d" stroke-width="16"/>
      <path d="M 35 -35 A 50 50 0 0 1 35 35" fill="none" stroke="#f7b733" stroke-width="16"/>
      <path d="M 35 35 A 50 50 0 0 1 0 50" fill="none" stroke="#fc4a1a" stroke-width="16"/>

      <!-- Centro com porcentagens -->
      <text x="0" y="-5" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="Arial">58%</text>
      <text x="0" y="12" text-anchor="middle" fill="#888" font-size="10" font-family="Arial">positivo</text>
    </g>

    <!-- Stats laterais -->
    <g transform="translate(195, 70)">
      <rect x="0" y="0" width="50" height="15" rx="3" fill="#1a3a2a"/>
      <text x="25" y="11" text-anchor="middle" fill="#38ef7d" font-size="9" font-family="Arial">58%</text>

      <rect x="0" y="20" width="50" height="15" rx="3" fill="#3a3a1a"/>
      <text x="25" y="31" text-anchor="middle" fill="#f7b733" font-size="9" font-family="Arial">35%</text>

      <rect x="0" y="40" width="50" height="15" rx="3" fill="#3a1a1a"/>
      <text x="25" y="51" text-anchor="middle" fill="#fc4a1a" font-size="9" font-family="Arial">7%</text>
    </g>
  </g>

  <!-- Últimas Análises (Tabela) -->
  <g transform="translate(20, 400)">
    <rect x="0" y="0" width="760" height="40" rx="5" fill="#0f0f23"/>
    <text x="20" y="25" fill="#666" font-size="11" font-family="Arial">📝 Últimas Análises:</text>

    <!-- Entradas recentes -->
    <g transform="translate(140, 0)">
      <text x="0" y="25" fill="#38ef7d" font-size="10" font-family="monospace">"Produto excelente!" → 😊 POS</text>
      <text x="150" y="25" fill="#fc4a1a" font-size="10" font-family="monospace">|"Péssimo serviço" → 😞 NEG</text>
      <text x="300" y="25" fill="#f7b733" font-size="10" font-family="monospace">|"Entregou no prazo" → 😐 NEU</text>
      <text x="460" y="25" fill="#38ef7d" font-size="10" font-family="monospace">|"Super recomendo!" → 😊 POS</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="400" y="445" text-anchor="middle" fill="#444" font-size="10" font-family="monospace">
    Sistema de Análise de Sentimentos v0.1.0 • Atualizado em tempo real
  </text>
</svg>